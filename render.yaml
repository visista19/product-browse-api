# Render Blueprint: backend web service + frontend static site.
# Create both at once via "New +" -> "Blueprint" and point it at this repo.
services:
  - type: web
    name: product-browse-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false   # paste your Supabase connection string in the dashboard
      - key: NODE_VERSION
        value: 20

  - type: web
    name: product-browse-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to the deployed API URL, e.g. https://product-browse-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
